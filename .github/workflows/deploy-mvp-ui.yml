---
name: Deploy MVP UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - prototype/mvp-ui/**
      - .github/workflows/deploy-mvp-ui.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mvp-ui-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: prototype/mvp-ui/package-lock.json

      - name: Install and build
        working-directory: prototype/mvp-ui
        env:
          VITE_BASE_PATH: /Agents/
        run: |
          npm ci
          npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: prototype/mvp-ui/dist
          publish_branch: gh-pages
          force_orphan: true
